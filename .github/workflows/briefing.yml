name: Portfolio briefing

on:
  # GitHub Actions "schedule" je best-effort a u méně vytížených repozitářů umí naskočit
  # se zpožděním v řádu hodin (v praxi jsme viděli 2-6 h zpoždění den co den). Místo
  # jednoho pokusu v cílovou hodinu proto zkoušíme každou hodinu v okně 4-12 UTC (= 6-13
  # Praha přes obě roční období) — main.py díky oknu + pojistce v history.csv (main.py)
  # stejně briefing pošle jen jednou, takže časté pokusy nic nestojí navíc, jen zvyšují
  # šanci, že GitHub aspoň jeden z nich spustí blízko 8:00.
  schedule:
    - cron: "0 4-12 * * *"
  workflow_dispatch:       # ruční spuštění tlačítkem "Run workflow"

permissions:
  contents: write   # potřeba pro commit history.csv zpátky do repa po běhu

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python main.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          MODEL: ${{ secrets.MODEL }}
          # Ruční spuštění ignoruje hodinovou pojistku (pošle hned):
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
      # history.csv, glossary.md a docs/ (statický web) žijí jen v repu (runner je po běhu
      # smazaný) — commitni je zpátky. docs/ je zdroj pro GitHub Pages.
      - name: Commit updated history.csv / glossary.md / docs
        run: |
          git config user.name "portfolio-briefing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add history.csv glossary.md docs
          git diff --cached --quiet || git commit -m "Update portfolio history / glossary / web [skip ci]"
          git push
